name: Deploy UI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json
      - name: Build static UI
        run: |
          npm run ui:install
          npm run ui:build
        env:
          # Optional: override the default Worker URL baked into production builds
          VITE_PARSE_API_BASE: ${{ secrets.VITE_PARSE_API_BASE }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
