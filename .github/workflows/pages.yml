name: Deploy UI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: apps/ui

      - name: Build UI
        run: npm run build
        working-directory: apps/ui
        env:
          # Set this to your hosted parse API base URL in repo variables if needed.
          # Example: https://ast-api.example.workers.dev
          VITE_PARSE_API_BASE: ${{ vars.VITE_PARSE_API_BASE }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
